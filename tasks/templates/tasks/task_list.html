<!DOCTYPE html>
<html>

<head>
    <title>Tasks</title>
</head>

<body>
    <h1>Task List</h1>

    <a href="/create/">Create New Task</a>
    <br><br>

    <ul>
        {% for task in tasks %}
        <li>
            {{ task.title }} - 
            {% if task.completed %}
                ✅
            {% else %}
                ❌
            {% endif %}
        
            <a href="/toggle/{{ task.id }}/">Toggle</a>
            <a href="/delete/{{ task.id }}/">Delete</a>
        </li>
        {% endfor %}
    </ul>
</body>

</html>
